<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Camera Lab | 1.0.1</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
  display:flex;
  height:100vh;
}

/* layout */
#left{
  width:50%;
  display:flex;
  flex-direction:column;
  border-right:1px solid #1e293b;
}

#right{
  width:50%;
  display:flex;
  flex-direction:column;
}

/* top bar */
#topbar{
  display:flex;
  gap:10px;
  padding:10px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  align-items:center;
}

button{
  background:#1e293b;
  color:white;
  border:none;
  padding:8px 12px;
  cursor:pointer;
  border-radius:6px;
}

button:hover{
  background:#334155;
}

/* cámara */
#canvas{
  width:100%;
  height:50%;
  background:black;
}

/* editor */
#editor{
  width:100%;
  height:50%;
  background:#020617;
  color:#38bdf8;
  border:none;
  outline:none;
  padding:10px;
  font-family:monospace;
  resize:none;
}

/* consola */
#console{
  flex:1;
  background:#020617;
  overflow:auto;
  padding:10px;
  font-family:monospace;
}

/* input */
#inputBox{
  border:none;
  outline:none;
  padding:10px;
  background:#0f172a;
  color:white;
  border-top:1px solid #1e293b;
}

/* ayuda */
#help{
  position:absolute;
  top:50px;
  right:20px;
  width:300px;
  max-height:400px;
  overflow:auto;
  background:#020617;
  border:1px solid #1e293b;
  padding:10px;
  display:none;
}
</style>
</head>

<body>

<div id="left">
  <div id="topbar">
    <button id="runBtn">▶ RUN</button>
    <button id="stopBtn">⏹ STOP</button>

    🔥 Potencia:
    <input type="range" id="power" min="1" max="60" value="60">

    <button id="helpBtn">❓</button>
  </div>

  <canvas id="canvas"></canvas>

  <textarea id="editor">
// ejemplo:

const c = api.getPixel(100,100);

api.log(c);

if(c.r > 200){
  api.drawCircle(100,100);
}
  </textarea>
</div>

<div id="right">
  <div id="console"></div>
  <input id="inputBox" placeholder="input... (enter)">
</div>

<div id="help">
<h3>📘 API</h3>

<b>api.getPixel(x,y)</b><br>
Devuelve {r,g,b}<br><br>

<b>api.scanArea(x,y,w,h)</b><br>
Devuelve array de pixeles<br><br>

<b>api.drawCircle(x,y)</b><br>
Dibuja un círculo<br><br>

<b>api.log(...)</b><br>
Imprime en consola<br><br>

<b>await api.input(text)</b><br>
Pide input del usuario<br><br>

<hr>

<b>Tips:</b><br>
- Se ejecuta en loop<br>
- Podés usar condiciones<br>
- Evitá loops infinitos<br>

</div>

<video id="video" autoplay style="display:none;"></video>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const editor = document.getElementById("editor");
const consoleDiv = document.getElementById("console");
const inputBox = document.getElementById("inputBox");

const runBtn = document.getElementById("runBtn");
const stopBtn = document.getElementById("stopBtn");
const powerSlider = document.getElementById("power");

const helpBtn = document.getElementById("helpBtn");
const helpDiv = document.getElementById("help");

canvas.width = 640;
canvas.height = 480;

/* =======================
   🎥 WEBCAM
======================= */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

/* =======================
   🖥️ CONSOLA
======================= */
function log(...msg){
  consoleDiv.innerHTML += "<div>> " + msg.join(" ") + "</div>";
  consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

/* =======================
   ⌨ INPUT
======================= */
let inputResolve = null;

inputBox.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    if(inputResolve){
      inputResolve(inputBox.value);
      inputBox.value = "";
    }
  }
});

function input(text){
  log(text);
  return new Promise(res=>{
    inputResolve = res;
  });
}

/* =======================
   🎨 PIXELES
======================= */
function getPixel(x,y){
  const d = ctx.getImageData(x,y,1,1).data;
  return {r:d[0], g:d[1], b:d[2]};
}

function scanArea(x,y,w,h){
  return ctx.getImageData(x,y,w,h).data;
}

/* =======================
   ✏️ DIBUJO
======================= */
function drawCircle(x,y){
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(x,y,10,0,Math.PI*2);
  ctx.fill();
}

/* =======================
   🧠 API
======================= */
const api = {
  getPixel,
  scanArea,
  drawCircle,
  log,
  input
};

/* =======================
   ⚙ EJECUTOR
======================= */
let running = false;

function runUserCode(){
  try{
    const func = new Function("api", editor.value);
    func(api);
  }catch(e){
    log("ERROR:", e.message);
  }
}

/* =======================
   🔁 LOOP CONTROLADO
======================= */
let lastTime = 0;

function loop(time){
  if(!running) return;

  const power = powerSlider.value; // 1 a 60 FPS
  const interval = 1000 / power;

  if(time - lastTime > interval){
    lastTime = time;

    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    runUserCode();
  }

  requestAnimationFrame(loop);
}

/* =======================
   🎮 CONTROLES
======================= */
runBtn.onclick = ()=>{
  if(!running){
    running = true;
    loop(0);
  }
};

stopBtn.onclick = ()=>{
  running = false;
};

/* =======================
   ❓ HELP
======================= */
helpBtn.onclick = ()=>{
  helpDiv.style.display =
    helpDiv.style.display === "none" ? "block" : "none";
};
</script>

</body>
</html>
